# Quarkus development configuration
quarkus.profile=dev
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Đặt tiền tố /api cho tất cả các JAX-RS Resources
quarkus.rest.path=/api

# MySQL configuration for local development
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/hotel_22
quarkus.datasource.username=root
quarkus.datasource.password=123456
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file

# MongoDB configuration
quarkus.mongodb.connection-string=mongodb+srv://levanchinh13052005_db_user:ZnNNmXhZq98owuOC@cluster0.j9w8jmh.mongodb.net/?appName=Cluster0
quarkus.mongodb.database=hotel_22

# CORS configuration
# Bật tính năng CORS
quarkus.http.cors=true

# Cho phép origin của frontend (Vite thường dùng 5173)
quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174

# Cho phép các phương thức HTTP cần thiết
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS,PATCH

# Cho phép các Header (quan trọng khi bạn dùng JWT/Authorization)
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With,Accept,Origin

# (Tùy chọn) Cho phép gửi kèm cookie hoặc thông tin xác thực
quarkus.http.cors.access-control-allow-credentials=true

# Cho phép các request OPTIONS (preflight) đi qua lớp bảo mật mà không cần token
quarkus.security.permit-all-options=true

# JWT Configuration
smallrye.jwt.enabled=true
mp.jwt.verify.issuer=https://example.com/hotel22
# Trong môi trường DEV, nếu không có public key, Quarkus sẽ tự tạo hoặc bỏ qua check ký nếu cấu hình đúng
# Nhưng tốt nhất là login lại sau khi thay đổi này.
quarkus.jackson.deserialization.accept-empty-string-as-null-object=true
